<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Instagram Feed</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
 <link rel="stylesheet" href="styles.css">
</head>

<body>


  <nav class="navbar navbar-light bg-light">
    <div class="container d-flex justify-content-between">

      <span class="navbar-brand">Instagram</span>

      <div>
        <button class="btn btn-success me-2" data-bs-toggle="modal" data-bs-target="#miModal">
          Crear publicacion
        </button>

        <div class="btn-group">
          <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
            Configuracion
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#">Perfil</a></li>
            <li><a class="dropdown-item" href="#">Privacidad</a></li>
            <li><a class="dropdown-item text-danger" href="#">Cerrar sesion</a></li>
          </ul>
        </div>
      </div>

    </div>
  </nav>


  <div class="text-center mt-3">
    <div class="text-center mt-3">

      <button class="btn btn-light" onclick="mostrarGrid()">
        <i class="bi bi-grid-3x3"></i>
      </button>

      <button class="btn btn-primary" onclick="mostrarLista()">
        <i class="bi bi-square-fill"></i>
      </button>

    </div>
  </div>


  <div id="vista-grid" class="container mt-4">

    <div class="row mt-3">
      <div class="col-4"><img src="https://picsum.photos/id/1015/600" class="img-fluid" onclick="mostrarLista()"></div>
      <div class="col-4"><img src="https://picsum.photos/id/1016/600" class="img-fluid" onclick="mostrarLista()"></div>
      <div class="col-4"><img src="https://picsum.photos/id/1018/600" class="img-fluid" onclick="mostrarLista()"></div>
    </div>

    <div class="row mt-3">
      <div class="col-4"><img src="https://picsum.photos/id/1020/600" class="img-fluid" onclick="mostrarLista()"></div>
      <div class="col-4"><img src="https://picsum.photos/id/1024/600" class="img-fluid" onclick="mostrarLista()"></div>
      <div class="col-4"><img src="https://picsum.photos/id/1025/600" class="img-fluid" onclick="mostrarLista()"></div>
    </div>

    <div class="row mt-3">
      <div class="col-4"><img src="https://picsum.photos/id/1035/600" class="img-fluid" onclick="mostrarLista()"></div>
      <div class="col-4"><img src="https://picsum.photos/id/1039/600" class="img-fluid" onclick="mostrarLista()"></div>
      <div class="col-4"><img src="https://picsum.photos/id/1043/600" class="img-fluid" onclick="mostrarLista()"></div>
    </div>
  </div>



  <div id="vista-lista" class=" mt-4 d-none">

    <div class="card mb-3">
      <h1>Lago Azul</h1>
      <img src="https://picsum.photos/id/1015/600" class="card-img-top  img-pequena">
      <div class="card-body">
        <p><strong>300 Likes</strong></p>


      </div>
    </div>
   
    <div class="card mb-3">
       <h1>Gran Cañon</h1>
      <img src="https://picsum.photos/id/1016/600" class="card-img-top  img-pequena">
      <div class="card-body">
        <p><strong>150 likes</strong></p>
      </div>
    </div>
  </div>

  
  <script>
    function mostrarGrid() {
      document.getElementById("vista-grid").classList.remove("d-none");
      document.getElementById("vista-lista").classList.add("d-none");
    }

    function mostrarLista() {
      document.getElementById("vista-lista").classList.remove("d-none");
      document.getElementById("vista-grid").classList.add("d-none");
    }
  </script>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


  <div class="modal fade" id="miModal">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Nueva publicacion</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <textarea class="form-control" placeholder="¿Qué quieres compartir?"></textarea>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button class="btn btn-success">Publicar</button>
        </div>

      </div>
    </div>
  </div>
</body>

</html>
